carebridge.jwt.issuer=test-issuer
# Test-only key matching JwtFilter constant; never reuse in production.
carebridge.jwt.secret=A_VERY_LONG_SECRET_KEY_FOR_TESTING_PURPOSES_ONLY_123456
carebridge.jwt.expire=3600000

spring.datasource.url=jdbc:h2:mem:carebridge-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
server.servlet.context-path=/api
