carebridge.jwt.issuer=test-issuer
carebridge.jwt.secret=test-secret-key-for-jwt-signing
carebridge.jwt.expire=3600000

spring.datasource.url=jdbc:h2:mem:carebridge-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
